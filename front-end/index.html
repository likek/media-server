<!DOCTYPE html>
<html lang="zh-CN" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <title>媒体服务器</title>
  </head>
  <body>
    <div id="app"></div>

    <script src="/workbox-window.prod.umd.js"></script>
    <script>
      if ('serviceWorker' in navigator && !localStorage.getItem('disable-sw')) {
        var wb = new workbox.Workbox('/sw.js');
        wb.addEventListener('activated', event => {
          if (!event.isUpdate) {
            console.log('sw首次激活!');
          } else {
            console.log('sw更新!');
          }
        });
        wb.addEventListener('waiting', event => {
          console.log('sw waiting状态');
        });
        wb.addEventListener('message', event => {
          if (event.data.type === 'CACHE_UPDATED') {
            var updatedURL = event.data.payload.updatedURL;
            console.log(`缓存更新: ${updatedURL}!`);
          }
        });
        wb.addEventListener('installed', event => {
          console.log('sw已安装, isUpdate:', event.isUpdate);
        });
        wb.register();
      }
    </script>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
