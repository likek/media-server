<!DOCTYPE html>
<html lang="en,zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no">
    <title>/</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div id="toast"></div>
    <input onchange="uploadFile()" type="file" id="fileInput" style="display: none;">
    <div class="main">
        <div class="top" id="top">
            <div class="top-form">
                <input id="inputSearch" type="text" maxlength="100" onkeypress="handleKeyPress(event)">
                <button class="btn-search" onclick="handleSearch(event)">
                    <div id="searchTips" class="search-tips">注意:只会从服务端缓存搜索，浏览过的目录才有缓存</div>
                    搜索
                </button>
                <button onclick="collectVideosFromText()">提取资源</button>
                <button onclick="updateCache()">刷新</button>
                <button onclick="createFolder()">新建</button>
                <button onclick="triggerFileUpload()">上传</button>
                <progress id="progressBar" value="0" max="100"></progress><span id="progressBarValue">0%<span></span>
            </div>
            <div  style="padding: 0 0 4px 0;display: flex;justify-content: space-between;">
                <div id="currentPath" style="line-height: 24px; font-size: 12px;color: #999;max-width: calc(100% - 90px);word-break: break-all;"></div>
                <div >
                    <button onclick="loadMedia('')" id="btnRoot">主页</button>
                    <button onclick="goBackDir()" id="btnBackDir">返回</button>
                </div>
            </div>
        </div>
        <div class="media" id="mediaContainer"></div>
    </div>
    <div id="myModal" class="modal" onclick="closeModal()">
        <img class="modal-content" id="img01">
    </div>

    <div id="txtModal" class="txt-modal" onclick="closeModal()">
        <div class="txt-modal-btns">
            <button id="btnTxtModelClose" class="btn-txt-model-close">关闭</button>
            <div id="txtFileName" class="grey-color"></div>

            <div class="grey-color">第<span id="currPage"></span>页</div>
            <button id="btnTxtModelJump">跳转</button>
            <button id="btnTxtModelNext" class="btn-txt-model-next">下一页</button>
        </div>
        <div class="txt-modal-content" id="txtContent"></div>
    </div>

    <div id="promptModal" class="modal">
        <div class="modal-content">
            <div id="promptModalTitle" class="modal-title">请输入文本</div>
            <textarea id="promptModalContent" class="modal-textarea" placeholder="请输入文本"></textarea>
            <div class="modal-buttons">
                <button id="promptCancelButton" class="modal-button">取消</button>
                <button id="promptConfirmButton" class="modal-button">确认</button>
            </div>
        </div>
    </div>
    

    <script src="lib/mux.min.js"></script>
    <script src="videoHelper.js"></script>
    <script src="main.js"></script>
</body>
</html>
